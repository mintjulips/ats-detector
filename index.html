<!DOCTYPE html>
<html>
<head>
<title>ATS Detector</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 100px;
}

input {
  width: 400px;
  padding: 10px;
}

button {
  padding: 10px 20px;
}

#result {
  margin-top: 30px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>ATS Detector</h1>
<p>Enter a job application URL</p>

<input id="urlInput" placeholder="https://company.com/careers">
<button onclick="detectATS()">Detect</button>

<div id="result"></div>

<script>

async function detectATS() {

  const url = document.getElementById("urlInput").value;

  const response = await fetch("/detect", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({url})
  });

  const data = await response.json();

  document.getElementById("result").innerHTML =
    "Detected ATS: <b>" + data.ats + "</b>";

}

</script>

</body>
</html>
